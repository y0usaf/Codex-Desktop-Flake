name: Daily Upstream Sync

on:
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: repo-update
  cancel-in-progress: false

jobs:
  update-dmg-hash:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Update pinned hashes and versions
        run: nix shell nixpkgs#p7zip nixpkgs#nodejs_20 nixpkgs#asar --command ./scripts/update-dmg-hash.sh

      - name: Validate build after hash refresh
        run: nix build .#packages.x86_64-linux.default

      - name: Commit and push hash update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add package.nix
          # Build a commit message reflecting what actually changed
          MSG="chore: sync upstream Codex"
          BODY=""
          if git diff --cached package.nix | grep -q 'betterSqlite3Version\|nodePtyVersion'; then
            BODY="${BODY:+$BODY, }native module versions updated"
          fi
          if git diff --cached package.nix | grep -q 'src = fetchurl'; then
            BODY="${BODY:+$BODY, }DMG hash refreshed"
          fi
          [ -n "$BODY" ] && MSG="$MSG ($BODY)"
          git commit -m "$MSG"
          git pull --rebase origin main
          git push origin main

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const title = `Daily upstream sync failed - ${new Date().toISOString().slice(0,10)}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-sync-failure'
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The daily upstream sync workflow failed.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['automated-sync-failure']
              });
            }
