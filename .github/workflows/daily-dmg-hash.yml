name: Daily DMG Hash Refresh

on:
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch:

jobs:
  update-dmg-hash:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Update pinned DMG hash
        run: ./scripts/update-dmg-hash.sh

      - name: Validate build after hash refresh
        run: nix build .#packages.x86_64-linux.default

      - name: Commit and push hash update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add package.nix
          git commit -m "chore: refresh pinned Codex DMG hash"
          git push origin main
